name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    env:
      PYTHONPATH: src
      ECC_INIT_NETWORK_E2E: "0"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test/build tools
        run: python -m pip install --upgrade pip==25.1.1 setuptools==80.9.0 wheel==0.45.1 pytest==8.4.1

      - name: Install package for tests
        run: python -m pip install -e . --no-build-isolation

      - name: Unit and integration tests
        run: python -m pytest --ignore=tests/test_network_e2e.py

      - name: Compile source
        run: python -m compileall -q src

      - name: Build wheel
        run: python -m pip wheel . --no-deps --no-build-isolation -w dist

      - name: Check wheel package data
        run: python scripts/check_wheel_contents.py dist

      - name: Wheel install and CLI smoke
        run: python scripts/cli_smoke.py dist

  pipx-smoke:
    name: pipx install smoke
    runs-on: ubuntu-latest
    env:
      PIPX_HOME: /tmp/ecc-init-pipx-home
      PIPX_BIN_DIR: /tmp/ecc-init-pipx-bin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipx
        run: python -m pip install --upgrade pip==25.1.1 pipx==1.7.1

      - name: Install package with pipx
        run: python -m pipx install . --force

      - name: Run pipx-installed CLI
        run: /tmp/ecc-init-pipx-bin/ecc-init init . --json
